<footer class="fixed-bottom bg-primary text-white text-center py-3">
    <div class="container">
        {% if site_footer %}
            <div class="mb-1">
                {{ site_footer.footer_text|safe }}
            </div>

            {% if site_footer.contact_link %}
                <p class="mb-0">
                    <a href="{{ site_footer.contact_link }}" class="text-white text-decoration-underline">
                        {{ site_footer.contact_text|default:"Contact" }}
                    </a>
                </p>
            {% endif %}
        {% else %}
            <p class="mb-0">Footer not set yet.</p>
        {% endif %}
    </div>
</footer>
