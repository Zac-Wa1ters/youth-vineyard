
<footer class="fixed-bottom bg-primary text-white text-center py-2">
    <div class="container">
        {% if site_footer %}
            <div class="mb-1">
                {{ site_footer.footer_text|safe }}
            </div>

            {% if site_footer.contact_link %}
                <p class="mb-0">
                    <a href="{{ site_footer.contact_link }}" class="text-white text-decoration-underline">
                        {{ site_footer.contact_text|default:"The Youth Vineyard" }}
                    </a>
                </p>
            {% endif %}
        {% else %}
            <p class="mb-0">terryrockette@gmail.com | 555-555-5555 | The Youth Vineyard Inc.</p>
        {% endif %}
    </div>
</footer>
