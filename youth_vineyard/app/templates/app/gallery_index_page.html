{% extends "base.html" %}
{% load wagtailcore_tags wagtailimages_tags %}

{% block content %}

<h1>{{ page.title }}</h1>
<div class="gallery">

    {% for event in page.get_children.live %}
        <div>
            <a href="{{ event.url }}">
                {{ event.title }}
            </a>
        </div>
    {% endfor %}

</div>

{% endblock %}
