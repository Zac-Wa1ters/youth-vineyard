{% extends "base.html" %}
{% load wagtailcore_tags wagtailimages_tags %}

{% block content %}

<h1>{{ page.title }}</h1>
<h3>{{ page.date }}</h3>


{% if page.video_url %}
     <iframe src="{{ page.video_url }}" width="560" height="315"></iframe>
{% elif page.hero_image%}
    <img src="{{ page.hero_image.url }}" alt="{{ page.title }}">
{% endif %}

<div>
<p>{{ page.description|richtext}}</p>
</div>


{% endblock %}
